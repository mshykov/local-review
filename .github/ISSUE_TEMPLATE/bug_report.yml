name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of local-review are you running?
      placeholder: "e.g., v0.1.0 or output of `local-review version`"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which mode were you using?
      options:
        - Review (local-review review/staged/commit/branch — multi-LLM by default)
        - Single-LLM fallback (no LLM CLI authenticated, hit configured provider:)
        - Doctor (local-review doctor)
        - Init (local-review init)
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run command '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (if relevant)
      description: Paste your .local-review.yml (remove any API keys!)
      render: yaml
      placeholder: |
        provider:
          base_url: https://api.openai.com/v1
          model: gpt-4o-mini

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or relevant output
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (if building from source)
      placeholder: "e.g., go1.23.0"
