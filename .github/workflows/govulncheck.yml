name: govulncheck

# Go dependency vulnerability scanning. CodeQL covers our own source
# (SAST); this covers *known CVEs in dependencies*, which CodeQL doesn't.
# govulncheck is low-noise: it reports a vuln only when the vulnerable
# symbol is actually reachable from our code, not merely present in go.sum.
#
# Runs on every push/PR AND on a weekly schedule — the schedule is the
# point: a CVE can be disclosed against an already-merged, pinned
# dependency long after the PR that introduced it, and only a time-based
# run will catch that.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 06:00 UTC — catch vulns disclosed since the last push.
    - cron: '0 6 * * 1'

# Read-only: this job checks out code and scans it — no writes.
permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          # check-latest makes setup-go resolve the newest 1.26.x patch
          # instead of the runner's cached toolchain — a stale cache left
          # CI on go1.26.4 after GO-2026-5856 (crypto/tls) was fixed in
          # go1.26.5, turning govulncheck red repo-wide.
          check-latest: true
          cache: true
      - name: Scan dependencies for known vulnerabilities
        # govulncheck is a `tool` directive in go.mod (pinned version,
        # go.sum-checksum-verified across its full dependency graph) —
        # not a bare `go install x@version`, which Sonar flags as an
        # unpredictable dependency install (no lock-file backing it).
        run: go tool govulncheck ./...
