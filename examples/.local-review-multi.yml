# local-review v0.5+ config example
#
# Cascading order (lowest precedence first):
#   1. Built-in defaults
#   2. ~/.local-review.yml
#   3. ./.local-review.yml          ← this file
#   4. CLI flags
#
# Default behaviour: every LLM CLI that is installed AND authenticated
# runs in parallel and the findings are merged. You only need this file
# to override defaults — pin a model, disable a provider, change merge
# settings, etc. Setting `enabled: true` is redundant; `enabled: false`
# is the explicit opt-out (still overridable with `--only <name>`).

llms:
  claude:
    # enabled: true                     # default; omit to use auto-detect
    cli_path: claude                    # auto-detected if empty
    model: claude-3-5-sonnet-20241022
    api_key_env: ANTHROPIC_API_KEY      # surfaced in the empty-key error message
    timeout_seconds: 120

  gemini:
    cli_path: gemini
    model: gemini-1.5-pro
    api_key_env: GEMINI_API_KEY         # free key from https://aistudio.google.com/apikey
    timeout_seconds: 120

  # Codex - paid; either ChatGPT Plus ($20/mo) via 'codex login', or
  # an OpenAI API key (pay-per-token, usually cheaper for occasional use).
  # Runs by default if you've authenticated. Set `enabled: false` to opt out.
  codex:
    cli_path: codex
    model: gpt-4
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 120

# Merge configuration
merge:
  preferred_llm: auto                   # 'auto' or specific LLM name (claude, gemini, codex)
  deduplicate: true                     # remove duplicate findings
  consensus_threshold: 2                # N LLMs agreeing = "Confirmed by N"

# Storage configuration
storage:
  base_path: .local-review/reviews      # where to save review files

# Review settings (same as v0)
review:
  min_severity: warning                 # nit|info|warning|major|critical
  max_findings: 20                      # hard cap per review
  exclude:
    - "**/*.lock"
    - "**/*.snap"
    - "**/dist/**"
    - "**/build/**"
    - "**/node_modules/**"
  # prompt_pack: typescript             # force specific pack (optional)

# v0 single-LLM mode (still works)
provider:
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  api_key_env: LOCAL_REVIEW_API_KEY
  timeout_seconds: 60
