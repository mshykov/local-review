name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pin GITHUB_TOKEN to least-privilege. The CI job only checks out
# the code, runs gofmt / vet / test / build — no API writes, no
# artifact uploads, no PR comments. Without this block the token
# inherits the repo / org default scopes, flagged by GitHub code
# scanning (rule: workflow has no explicit permissions).
# bench.yml, release.yml, and sonar.yml already pin their own;
# this closes the gap on the last workflow.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'
          cache: true
      - name: Tidy + verify
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Gofmt
        # CLAUDE.md mandates `gofmt -s + go vet` as the style baseline.
        # Pre-v0.7.2 we ran `go vet` only and gofmt drift slipped through
        # (caught by self-review on main vs v0.6.6). `gofmt -l` lists
        # files that would change; non-empty output → fail the gate.
        run: |
          fmt_diff=$(gofmt -s -l .)
          if [ -n "$fmt_diff" ]; then
            echo "::error::gofmt -s drift in:"
            echo "$fmt_diff"
            echo
            echo "Run 'gofmt -s -w .' locally and commit."
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build
        run: go build -o /tmp/local-review ./cmd/local-review
      - name: E2E
        # End-to-end: builds the real binary and drives it (staged / version /
        # doctor) against an in-process fake OpenAI-compatible LLM — no real
        # LLM, no network, fully deterministic. Behind the `e2e` build tag so
        # the `go test -race ./...` step above stays fast and hermetic. Runs
        # on every push/PR, so it also gates the release PR.
        run: go test -tags e2e -count=1 ./e2e/...
