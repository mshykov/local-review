# local-review project config — unified agent model (v0.14+).
#
# Every authenticated CLI (claude / codex / copilot / gemini) AND every
# reachable provider entry below runs in parallel for `local-review review`.
# `local-review audit` picks one (first by default, or pin via --with <name>).
#
# Cascading order (lowest precedence first):
#   1. Built-in defaults
#   2. ~/.local-review.yml
#   3. ./.local-review.yml          ← this file
#   4. CLI flags

llms:
  # Pick any name — it's the agent's identifier in `doctor`, `--only`,
  # `--with`, and the on-disk review filename. Conventions: "ollama" /
  # "qwen" / "local-fast" / "cloud" / "air-gapped" — whatever reads well
  # in your team's vocabulary.
  ollama:
    # Any OpenAI-compatible endpoint. The presence of base_url is what
    # makes this entry a PROVIDER agent (HTTP, no CLI subprocess).
    base_url: http://localhost:11434/v1

    # Model name passed in the chat-completions request.
    # Examples: qwen2.5-coder:7b, llama3.1:8b, deepseek-coder-v2, gpt-4o-mini
    model: qwen2.5-coder:7b

    # Optional: env var name for the API key. Local Ollama / LAN /
    # Tailscale endpoints are auth-free by default (see isLocalURL).
    # Public-internet endpoints (OpenAI, Anthropic, …) need this set.
    # api_key_env: LOCAL_REVIEW_API_KEY

    # Optional per-call timeout; default 60.
    # timeout_seconds: 60

  # A second provider entry is just another agent — run alongside the
  # local one and the CLIs. Comment in / out to flip the active set.
  #
  # cloud-openai:
  #   base_url: https://api.openai.com/v1
  #   model: gpt-4o-mini
  #   api_key_env: LOCAL_REVIEW_API_KEY

  # CLI agents are auto-detected — listing them is optional, but if you
  # do, the same shape works (no base_url needed; the runtime locates
  # the binary). Use this only to pin a specific model or disable one.
  #
  # claude:
  #   model: claude-sonnet-4-6
  # codex:
  #   enabled: false

review:
  # Hide nits + info findings unless explicitly requested.
  min_severity: warning

  # Hard cap so a chatty model can't drown you in noise.
  max_findings: 20

  exclude:
    - "**/*.lock"
    - "**/*.snap"
    - "**/dist/**"
    - "**/build/**"
    - "**/node_modules/**"

# merge:
#   # Which agent consolidates the per-LLM findings. "auto" follows the
#   # claude > codex > copilot > gemini preference; set explicitly to pin.
#   preferred_llm: auto
