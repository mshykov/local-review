name: SonarCloud

# CI-based SonarCloud analysis. Runs a fresh scan on every pull request and on
# every push to main, so each PR push gets a quality gate that reflects THAT
# PR's actual code.
#
# Why CI-based instead of SonarCloud's Automatic Analysis:
#   - Automatic Analysis (the SonarCloud GitHub App) does not reliably
#     re-analyze each PR push — it serves a stale analysis of an earlier
#     commit, so the PR gate would go red on code that's green on main.
#     CI-based analysis is computed from the exact checked-out commit.
#   - Automatic Analysis MUST stay disabled in the SonarCloud project settings
#     (Administration → Analysis Method): CI-based and Automatic analysis are
#     mutually exclusive and the scan errors out if both are enabled.
#   - This repo is public, so both SonarCloud analysis and GitHub Actions
#     minutes are free — there's no per-scan quota to conserve.
#
# Failure posture: Sonar is NOT a required status check (the branch ruleset
# requires `test` + CodeQL only), so a red Sonar gate surfaces a finding
# without blocking merge. Fork and Dependabot PRs don't run the scan
# (SONAR_TOKEN isn't exposed to those PR contexts) — see the job-level `if:`
# guard.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'examples/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'examples/**'

# Default to read-only; the scan only checks out and uploads results.
permissions:
  contents: read

jobs:
  scan:
    # Skip PRs where SONAR_TOKEN won't be exposed, otherwise the scan can't
    # authenticate and fails noisily. Same-repo non-Dependabot PRs and pushes
    # to main run normally.
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout + read-only Sonar upload
    steps:
      # fetch-depth: 0 gives Sonar the full history it needs for blame data
      # ("new code" calculations against branch lifetime) and PR base detection.
      # fetch-tags: true is required alongside it — a full-history fetch does
      # NOT guarantee tag refs come along, and the next step needs `git
      # describe --tags` to resolve real tags.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          # check-latest makes setup-go resolve the newest 1.26.x patch
          # instead of the runner's cached toolchain — a stale cache left
          # CI on go1.26.4 after GO-2026-5856 (crypto/tls) was fixed in
          # go1.26.5, turning govulncheck red repo-wide.
          check-latest: true
          cache: true

      - name: Run tests with coverage
        # -coverprofile produces the file Sonar's Go support consumes
        # directly (no conversion step needed). -covermode=atomic is
        # required when -race is enabled. We don't filter ./... — the
        # `.claude/` worktree directory exists only on developer
        # machines (gitignored), so CI's `go test ./...` already
        # only sees real packages. The `.claude/**` exclusion in
        # sonar-project.properties handles the analysis side, in case
        # a future contributor commits `.claude/` by accident.
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Resolve project version
        # The main branch's Quality Gate uses New Code = "previous version"
        # (SonarCloud project setting), which detects a release boundary by
        # watching sonar.projectVersion change between scans. We were never
        # passing it, so every scan reported "not provided" — the version
        # string never changed, so Sonar never saw a boundary and kept
        # comparing against the oldest analysis it had (v0.7.2, 2026-05-07),
        # silently growing "new code" to ~10 releases' worth of diff and
        # failing the coverage condition on code most of which had already
        # shipped. `git describe --tags --abbrev=0` resolves the nearest
        # reachable tag with no commit-distance suffix, so it stays constant
        # between releases and only changes when a new tag lands — matching
        # how this repo actually versions.
        id: version
        run: |
          version=$(git describe --tags --abbrev=0 2>/dev/null) || true
          if [ -z "$version" ]; then
            echo "::error::No git tag resolved via 'git describe --tags --abbrev=0' — check the checkout step still has fetch-tags: true. Refusing to fall back to a fixed placeholder version: a version string that never changes is exactly the bug this step exists to fix (it stalls Sonar's previous_version baseline forever)."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        # The action auto-detects PR context (sonar.pullrequest.key/branch/base)
        # from the GitHub Actions environment, so PRs and main both work with no
        # extra config. PR analysis always diffs against the PR's base branch
        # regardless of projectVersion, so this arg only changes main's own
        # dashboard/gate behavior (see "Resolve project version" above).
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL only needed for self-hosted SonarQube; SonarCloud
          # is the default and the action picks the right URL when omitted.
        with:
          args: -Dsonar.projectVersion=${{ steps.version.outputs.value }}
