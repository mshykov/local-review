name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege, same posture as ci.yml: this job only checks out the
# code and runs gitleaks — no API writes, no PR comments, no artifacts.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `gitleaks git` scans every commit on the
          # branch/PR, not just the tip — a secret added then "removed"
          # in a later commit is still in history and must be caught.
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Builds the gitleaks tool — doesn't build local-review (that's
          # ci.yml, pinned to the project's 1.26). Matches the project's
          # 1.26 toolchain, which already clears gitleaks v8.30.1's
          # Go >= 1.24.11 floor.
          go-version: '1.26'
          cache: true
      - name: Scan git history for secrets
        # gitleaks is a `tool` directive in go.mod (pinned version,
        # go.sum-checksum-verified across its full dependency graph) —
        # not a bare `go install x@version`, which Sonar flags as an
        # unpredictable dependency install (no lock-file backing it).
        # The module path is still the legacy zricethezav/ one (the repo
        # moved orgs but kept the go.mod module path).
        #
        # Honors .gitleaks.toml (allowlist) + .gitleaksignore (known
        # historical false positives). --redact keeps any match out of
        # the public CI log; non-zero exit on a finding fails the job.
        run: go tool gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1
