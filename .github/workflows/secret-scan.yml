name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege, same posture as ci.yml: this job only checks out the
# code and runs gitleaks — no API writes, no PR comments, no artifacts.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so `gitleaks git` scans every commit on the
          # branch/PR, not just the tip — a secret added then "removed"
          # in a later commit is still in history and must be caught.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'
          cache: true
      - name: Install gitleaks (pinned, Go-module-checksum verified)
        # `go install <module>@<version>` is pinned AND verified against
        # the Go checksum database — no separate sha256 to maintain, and
        # it reuses the toolchain already set up above. The module path
        # is still the legacy zricethezav/ one (the repo moved orgs but
        # kept the go.mod module path).
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan git history for secrets
        # Honors .gitleaks.toml (allowlist) + .gitleaksignore (known
        # historical false positives). --redact keeps any match out of
        # the public CI log; non-zero exit on a finding fails the job.
        run: "$(go env GOPATH)/bin/gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1"
