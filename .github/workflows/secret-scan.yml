name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege, same posture as ci.yml: this job only checks out the
# code and runs gitleaks — no API writes, no PR comments, no artifacts.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so `gitleaks git` scans every commit on the
          # branch/PR, not just the tip — a secret added then "removed"
          # in a later commit is still in history and must be caught.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # This job only BUILDS the gitleaks tool — it doesn't build
          # local-review (that's ci.yml, pinned to the project's 1.23).
          # gitleaks v8.30.1 requires Go >= 1.24.11, so this job uses a
          # newer toolchain. GOTOOLCHAIN=auto (below) lets `go install`
          # fetch a still-newer toolchain if a future gitleaks needs one,
          # so this won't silently break on the next gitleaks bump.
          go-version: '1.24'
          cache: true
      - name: Install gitleaks (pinned, Go-module-checksum verified)
        # `go install <module>@<version>` is pinned AND verified against
        # the Go checksum database — no separate sha256 to maintain. The
        # module path is still the legacy zricethezav/ one (the repo
        # moved orgs but kept the go.mod module path).
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan git history for secrets
        # Honors .gitleaks.toml (allowlist) + .gitleaksignore (known
        # historical false positives). --redact keeps any match out of
        # the public CI log; non-zero exit on a finding fails the job.
        run: "$(go env GOPATH)/bin/gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1"
