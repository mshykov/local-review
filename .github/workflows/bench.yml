name: Bench (replay)

# Issue #56 Phase 1 acceptance criterion: a CI job that runs the
# benchmark on PRs touching the prompt packs (or the bench harness
# itself) so prompt changes can't ship without a recorded score
# delta.
#
# This workflow runs the bench in *replay mode only* — it reads
# pre-recorded LLM outputs from bench/fixtures/. CI never invokes a
# real LLM CLI:
#
#   * GitHub Actions has no access to anthropic/openai/google
#     credentials.
#   * Live runs cost tokens on every PR and depend on three external
#     services staying up.
#   * Replay deliberately measures "did the parser/scorer/dataset
#     stay coherent?" — not "did the model improve" (which would
#     require fresh runs against real LLMs).
#
# Re-record fixtures whenever prompt packs change behaviour. See
# bench/README.md for the recipe.

on:
  pull_request:
    paths:
      - 'internal/prompts/**'
      - 'internal/bench/**'
      - 'bench/**'
      - 'cmd/local-review/bench*.go'
      - '.github/workflows/bench.yml'
  workflow_dispatch:

# Pin the GITHUB_TOKEN to the minimum surface this job needs:
# checkout the code, no writes. Without this block the token
# inherits the repo's default scopes — flagged by CodeQL and
# CodeRabbit as a least-privilege violation. The bench is
# read-only (no PR comments, no artifact deletion, no API
# calls); contents:read is enough.
permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: go build -o /tmp/local-review ./cmd/local-review

      - name: Run bench in replay mode
        run: |
          /tmp/local-review bench \
            --replay bench/fixtures \
            --dataset bench/dataset \
            --out bench-results.json
          echo
          echo "JSON results saved to bench-results.json"

      - name: Upload bench results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bench-results
          path: bench-results.json
          retention-days: 30
