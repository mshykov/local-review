# SonarCloud configuration. The scan workflow (.github/workflows/sonar.yml)
# fires only on release-labeled PR merges to main; this file tells Sonar
# what to scan and where to find coverage.
#
# The action auto-detects organization + project key from secrets, but we
# pin them here so the wiring is visible in-repo (and a future contributor
# spinning up a fork has a working baseline).

sonar.projectKey=mshykov_local-review
sonar.organization=mshykov

# Sources to analyze — everything Go, plus shell scripts and YAML
# configuration. The .claude/ worktree directory holds Claude Code's
# scratch-space copies of the repo (used during /review sessions); we
# explicitly exclude it because it duplicates real source paths and would
# inflate every metric Sonar tracks.
sonar.sources=.
sonar.exclusions=**/.claude/**,**/vendor/**,**/testdata/**,**/.local-review/**

# Copy-paste detection exclusions.
#   - init.go is largely a declarative table of provider presets (one
#     near-identical struct literal per provider); that structural similarity
#     is the intended shape of a data table, not duplication debt, and Sonar's
#     CPD otherwise trips the "duplication on new code" gate every time a
#     provider is added. Logic in init.go is minimal; correctness is covered
#     by init_test.go.
#   - *_test.go: table-driven Go tests are intentionally repetitive (one
#     near-identical {name, input, want} case struct per scenario). That's the
#     same "data table, not debt" shape, and a new table test (e.g. the moved
#     TestIsBlockingMarkdown cases) otherwise trips the new-code duplication
#     gate. Same rationale as the S3776 test-file exemption below.
sonar.cpd.exclusions=**/cmd/local-review/init.go,**/*_test.go

# Go test files have a `_test.go` suffix; route them to the test scope so
# Sonar doesn't count test fixtures as production code.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage report path matches the -coverprofile output in sonar.yml.
sonar.go.coverage.reportPaths=coverage.out

# Don't apply the Cognitive Complexity rule (S3776) to test files. Table-driven
# Go tests are intentionally long and linear (one t.Run per case); their
# "complexity" is the case count, not branching that's hard to maintain.
# Refactoring a test to satisfy the metric adds indirection without value.
# Scoped to S3776 on *_test.go only — every other rule still applies to tests.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
