name: Release

# Single combined release pipeline:
#   prepare → build (matrix) → publish → update-homebrew
#
# Triggered by:
#   - Push to main, only when the merged PR has a `release` label.
#     The bump type is read from `major`/`minor`/`patch` labels (default: patch).
#     ALSO requires a complete Copilot review on the PR with every
#     Copilot conversation resolved — see the "Verify Copilot review"
#     step below.
#   - Manual workflow_dispatch with an explicit version (e.g. v0.1.5).
#     Bypasses the Copilot gate; the maintainer is taking responsibility.
#
# Why combined: GitHub doesn't let GITHUB_TOKEN-pushed events trigger other
# workflows. Splitting tag/build/publish across multiple workflows broke that
# chain. Doing it all in one run avoids the issue without needing a PAT.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'examples/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version tag (e.g. v0.1.5). Skips label detection.'
        required: true

# Prevent concurrent releases from racing on the same semver computation.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Gate (release label or manual dispatch)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            # Validate version format before proceeding.
            if ! echo "$MANUAL_VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: version must match ^v[0-9]+\.[0-9]+\.[0-9]+$ (got: $MANUAL_VERSION)"
              exit 1
            fi
            echo "Manual dispatch: $MANUAL_VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Look up the PR via the GitHub API using the commit SHA. This works
          # for all merge strategies (squash, merge commit, rebase) — unlike
          # parsing the commit subject which only works for merge commits.
          pr_number=$(gh api "/repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "No PR found for commit ${COMMIT_SHA} — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          labels=$(gh pr view "$pr_number" --json labels --jq '.labels[].name' || echo "")
          if echo "$labels" | grep -qxF "release"; then
            echo "PR #$pr_number has 'release' label — proceeding"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR #$pr_number has no 'release' label — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Copilot review (release-labeled PRs only)
        # Manual workflow_dispatch is the maintainer's escape hatch — they
        # set the version explicitly and bypass this gate. Push-triggered
        # releases (the 99% path) MUST have a complete Copilot review with
        # every Copilot thread resolved.
        if: steps.gate.outputs.should_release == 'true' && inputs.version == ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          pr_number=$(gh api "/repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "ERROR: 'release' label set but no PR found for commit ${COMMIT_SHA}"
            exit 1
          fi

          owner="${REPO%%/*}"
          name="${REPO##*/}"

          # GraphQL because the REST review-comments endpoint doesn't
          # expose isResolved. Each reviewThread groups one or more
          # comments under a resolution state — the conversation as
          # a whole is what gets "resolved" in the UI.
          #
          # Pagination matters: a single page returns up to 100 threads.
          # If hasNextPage is true we'd silently miss unresolved Copilot
          # threads beyond the first page. Loop until exhausted; only
          # then trust the totals. Match any bot login containing
          # "copilot" (case-insensitive) — GitHub has shipped Copilot
          # review under several bot identities (copilot-pull-request-
          # reviewer[bot], github-copilot[bot], plain Copilot), and we'd
          # rather match too broadly than refuse to release because of
          # a bot rename.
          total=0
          unresolved=0
          cursor=""
          while :; do
            # Build the gh-api invocation. The first iteration must NOT
            # send a cursor at all — passing `cursor=""` makes the
            # graphql variable an empty string instead of null, which
            # GitHub's API rejects (it expects either a real cursor or
            # the variable absent / null). Build the args slice
            # accordingly.
            if [ -z "$cursor" ]; then
              page=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F num="$pr_number" \
                -f query='
                  query($owner: String!, $name: String!, $num: Int!) {
                    repository(owner: $owner, name: $name) {
                      pullRequest(number: $num) {
                        reviewThreads(first: 100) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            isResolved
                            comments(first: 1) {
                              nodes { author { login } }
                            }
                          }
                        }
                      }
                    }
                  }')
            else
              page=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F num="$pr_number" -F cursor="$cursor" \
                -f query='
                  query($owner: String!, $name: String!, $num: Int!, $cursor: String) {
                    repository(owner: $owner, name: $name) {
                      pullRequest(number: $num) {
                        reviewThreads(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            isResolved
                            comments(first: 1) {
                              nodes { author { login } }
                            }
                          }
                        }
                      }
                    }
                  }')
            fi
            # Null-safe author check: a thread whose first comment has
            # no author (deleted bot account, or a comment-less thread
            # GitHub returned for some reason) makes `.login | test()`
            # crash the entire release job. Coalesce to "" first so the
            # filter just doesn't match those threads.
            copilot_filter='[.data.repository.pullRequest.reviewThreads.nodes[] | select(((.comments.nodes[0].author.login // "") | test("copilot"; "i")))]'
            page_total=$(echo "$page" | jq "$copilot_filter | length")
            page_unresolved=$(echo "$page" | jq "$copilot_filter | map(select(.isResolved == false)) | length")
            total=$((total + page_total))
            unresolved=$((unresolved + page_unresolved))
            has_next=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [ "$has_next" != "true" ]; then
              break
            fi
            cursor=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
          done

          if [ "$total" = "0" ]; then
            echo "::error::Release blocked — no Copilot review found on PR #${pr_number}."
            echo "Either wait for Copilot to complete its review and re-tag, or trigger this"
            echo "workflow manually via workflow_dispatch with an explicit version."
            exit 1
          fi
          if [ "$unresolved" -gt 0 ]; then
            echo "::error::Release blocked — Copilot has ${unresolved} unresolved review thread(s) on PR #${pr_number}."
            echo "Resolve each Copilot conversation in the GitHub UI before this release can ship,"
            echo "or trigger the release manually via workflow_dispatch (after fixing the underlying issues)."
            exit 1
          fi

          echo "Copilot review on PR #${pr_number}: ${total} thread(s), all resolved — proceeding"

      - name: Determine version
        id: bump
        if: steps.gate.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "version=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          pr_number=$(gh api "/repos/${REPO}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")
          labels=$(gh pr view "$pr_number" --json labels --jq '.labels[].name' || echo "")

          # Bump labels follow strict semver — see docs/RELEASE_PROCESS.md
          # "Label cheat sheet" for when each is appropriate. Quick reminder:
          #   major  = breaking changes (CLI flags removed, config schema rewrite)
          #   minor  = new user-visible feature (new pack, new command, new flag)
          #   patch  = bug fix, doc update, internal refactor, dep bump
          # When in doubt, prefer patch — minor inflates expectations and
          # burns version numbers fast in 0.x.
          if echo "$labels" | grep -qxF "major"; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$labels" | grep -qxF "minor"; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          new_version="v${major}.${minor}.${patch}"
          echo "Latest: $latest_tag → New: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          out="local-review"
          if [ "$GOOS" = "windows" ]; then out="local-review.exe"; fi
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "$out" ./cmd/local-review

      - name: Package
        id: package
        run: |
          name="local-review_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${name}.zip" local-review.exe
            echo "file=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${name}.tar.gz" local-review
            echo "file=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.file }}
          retention-days: 1

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Create and push tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Idempotent: skip if the tag already exists on the remote.
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists — reusing"
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

  update-homebrew:
    needs: [prepare, publish]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mshykov/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          version="${VERSION_TAG#v}"
          base_url="https://github.com/mshykov/local-review/releases/download/${VERSION_TAG}"

          curl -fsSL "${base_url}/local-review_darwin_amd64.tar.gz" -o darwin_amd64.tar.gz
          curl -fsSL "${base_url}/local-review_darwin_arm64.tar.gz" -o darwin_arm64.tar.gz
          curl -fsSL "${base_url}/local-review_linux_amd64.tar.gz"  -o linux_amd64.tar.gz
          curl -fsSL "${base_url}/local-review_linux_arm64.tar.gz"  -o linux_arm64.tar.gz

          sha_darwin_amd64=$(shasum -a 256 darwin_amd64.tar.gz | awk '{print $1}')
          sha_darwin_arm64=$(shasum -a 256 darwin_arm64.tar.gz | awk '{print $1}')
          sha_linux_amd64=$(shasum -a 256 linux_amd64.tar.gz | awk '{print $1}')
          sha_linux_arm64=$(shasum -a 256 linux_arm64.tar.gz | awk '{print $1}')

          # Update version line (anchored to start of line)
          sed -i -E "s/^([[:space:]]*)version \"[^\"]*\"/\1version \"${version}\"/" Formula/local-review.rb

          # Replace each platform's sha256. The pattern matches the line
          # immediately following its corresponding url, so we need a
          # platform-aware substitution. We use awk for clarity.
          awk -v sda="$sha_darwin_amd64" \
              -v sdr="$sha_darwin_arm64" \
              -v sla="$sha_linux_amd64" \
              -v slr="$sha_linux_arm64" '
            /darwin_arm64\.tar\.gz/ { print; getline; sub(/sha256 "[^"]*"/, "sha256 \"" sdr "\""); print; next }
            /darwin_amd64\.tar\.gz/ { print; getline; sub(/sha256 "[^"]*"/, "sha256 \"" sda "\""); print; next }
            /linux_arm64\.tar\.gz/  { print; getline; sub(/sha256 "[^"]*"/, "sha256 \"" slr "\""); print; next }
            /linux_amd64\.tar\.gz/  { print; getline; sub(/sha256 "[^"]*"/, "sha256 \"" sla "\""); print; next }
            { print }
          ' Formula/local-review.rb > Formula/local-review.rb.new
          mv Formula/local-review.rb.new Formula/local-review.rb

          # Sanity: version must have been updated
          if ! grep -q "version \"${version}\"" Formula/local-review.rb; then
            echo "ERROR: Formula version was not updated correctly!"
            cat Formula/local-review.rb
            exit 1
          fi

          # Guard: ensure all SHAs were computed before verifying the formula.
          for sha_var in "$sha_darwin_amd64" "$sha_darwin_arm64" "$sha_linux_amd64" "$sha_linux_arm64"; do
            if [ -z "$sha_var" ]; then
              echo "ERROR: One or more SHA values are empty — aborting formula update!"
              exit 1
            fi
          done

          # Sanity: every computed SHA must appear in the updated formula.
          all_ok=true
          for sha_val in "$sha_darwin_amd64" "$sha_darwin_arm64" "$sha_linux_amd64" "$sha_linux_arm64"; do
            if ! grep -qF "$sha_val" Formula/local-review.rb; then
              echo "ERROR: SHA $sha_val is missing from Formula/local-review.rb after update!"
              all_ok=false
            fi
          done
          if [ "$all_ok" = "false" ]; then
            cat Formula/local-review.rb
            exit 1
          fi

      - name: Commit and push
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/local-review.rb
          if ! git diff --cached --quiet; then
            git commit -m "Update local-review to ${VERSION_TAG}"
            git push
          else
            echo "No changes to commit (formula already up to date)"
          fi
