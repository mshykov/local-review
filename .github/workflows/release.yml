name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="local-review"
          if [ "$GOOS" = "windows" ]; then out="local-review.exe"; fi
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "$out" ./cmd/local-review

      - name: Package
        run: |
          name="local-review_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${name}.zip" local-review.exe
          else
            tar -czf "${name}.tar.gz" local-review
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            local-review_*.tar.gz
            local-review_*.zip
          generate_release_notes: true
